<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Today Dashboard - Habit Stack Visualizer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Geist:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#363942",
                        "on-secondary-container": "#00311f",
                        "on-secondary-fixed-variant": "#005236",
                        "on-background": "#e0e2ed",
                        "outline-variant": "#414755",
                        "sleep": "#6366F1",
                        "on-primary-container": "#00285c",
                        "primary": "#adc6ff",
                        "fitness": "#10B981",
                        "secondary": "#4edea3",
                        "inverse-surface": "#e0e2ed",
                        "nutrition": "#F59E0B",
                        "surface": "#10131b",
                        "supplement": "#A855F7",
                        "on-error-container": "#ffdad6",
                        "surface-container-highest": "#31353d",
                        "error-container": "#93000a",
                        "on-secondary-fixed": "#002113",
                        "surface-tint": "#adc6ff",
                        "on-primary-fixed": "#001a41",
                        "surface-container-lowest": "#0b0e16",
                        "on-primary-fixed-variant": "#004493",
                        "surface-dark": "#171717",
                        "outline": "#8b90a0",
                        "on-tertiary-container": "#4c1a00",
                        "on-error": "#690005",
                        "surface-variant": "#31353d",
                        "tertiary-fixed": "#ffdbcc",
                        "surface-container": "#1c2028",
                        "secondary-container": "#00a572",
                        "surface-container-high": "#272a32",
                        "inverse-primary": "#005bc1",
                        "border-dark": "#262626",
                        "error": "#ffb4ab",
                        "on-secondary": "#003824",
                        "secondary-fixed-dim": "#4edea3",
                        "tertiary": "#ffb595",
                        "primary-fixed": "#d8e2ff",
                        "on-primary": "#002e69",
                        "background-dark": "#0A0A0A",
                        "on-surface-variant": "#c1c6d7",
                        "on-tertiary": "#571e00",
                        "primary-container": "#4b8eff",
                        "primary-fixed-dim": "#adc6ff",
                        "tertiary-container": "#ef6719",
                        "on-tertiary-fixed-variant": "#7c2e00",
                        "background": "#10131b",
                        "secondary-fixed": "#6ffbbe",
                        "on-tertiary-fixed": "#351000",
                        "surface-container-low": "#181c23",
                        "surface-dim": "#10131b",
                        "on-surface": "#e0e2ed",
                        "tertiary-fixed-dim": "#ffb595",
                        "inverse-on-surface": "#2d3039"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "element-gap": "0.75rem",
                        "stack-gap": "1.5rem",
                        "touch-target-min": "44px",
                        "container-margin": "1.25rem",
                        "telegram-bottom-safe": "56px"
                    },
                    "fontFamily": {
                        "body-sm": ["Inter"],
                        "mono-data": ["Geist"],
                        "headline-md": ["Geist"],
                        "label-caps": ["Geist"],
                        "stat-lg": ["Geist"],
                        "body-base": ["Inter"],
                        "stat-hero": ["Geist"]
                    },
                    "fontSize": {
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "mono-data": ["14px", { "lineHeight": "14px", "fontWeight": "500" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "stat-lg": ["32px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-base": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "stat-hero": ["48px", { "lineHeight": "48px", "letterSpacing": "-0.05em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-on-background min-h-screen font-body-base pb-telegram-bottom-safe">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-background/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-border-dark flex items-center justify-between px-container-margin h-14">
<div class="flex items-center gap-2 text-primary dark:text-primary-fixed-dim hover:opacity-80 active:scale-95 transition-transform cursor-pointer">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">analytics</span>
<span class="font-headline-md text-headline-md font-bold">Habit Stack</span>
</div>
<div>
<span class="material-symbols-outlined text-on-surface-variant hover:opacity-80 active:scale-95 transition-transform cursor-pointer">account_circle</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-20 px-container-margin pb-stack-gap flex flex-col gap-stack-gap max-w-[390px] mx-auto">
<!-- Progress Ring Section -->
<section class="flex flex-col items-center justify-center py-4 relative">
<div class="relative w-48 h-48 flex items-center justify-center">
<svg class="w-full h-full" viewbox="0 0 120 120">
<circle class="stroke-surface" cx="60" cy="60" fill="none" r="54" stroke-width="8"></circle>
<circle class="stroke-primary progress-ring__circle" cx="60" cy="60" fill="none" r="54" stroke-dasharray="339.292" stroke-dashoffset="101.787" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<div class="absolute flex flex-col items-center justify-center">
<span class="font-stat-hero text-stat-hero text-on-surface">70%</span>
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase mt-1">Today's Stack</span>
</div>
</div>
</section>
<!-- Morning Stack Card -->
<section class="bg-surface-dark border border-border-dark rounded-xl p-4 flex flex-col gap-element-gap">
<div class="flex items-center justify-between mb-2">
<h2 class="font-headline-md text-headline-md text-on-surface">Morning Stack</h2>
<span class="font-mono-data text-mono-data text-on-surface-variant">3/4</span>
</div>
<!-- Habit Item: Checked -->
<div class="flex items-center justify-between p-2 rounded-lg bg-fitness/10 min-h-[44px]">
<div class="flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-fitness"></div>
<span class="font-body-base text-body-base text-on-surface line-through opacity-70">Sunlight Exposure</span>
</div>
<div class="w-6 h-6 rounded border-2 border-fitness bg-fitness flex items-center justify-center cursor-pointer active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[16px] text-background-dark font-bold" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
<!-- Habit Item: Checked -->
<div class="flex items-center justify-between p-2 rounded-lg bg-supplement/10 min-h-[44px]">
<div class="flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-supplement"></div>
<span class="font-body-base text-body-base text-on-surface line-through opacity-70">Vitamins</span>
</div>
<div class="w-6 h-6 rounded border-2 border-supplement bg-supplement flex items-center justify-center cursor-pointer active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[16px] text-background-dark font-bold" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
<!-- Habit Item: Unchecked -->
<div class="flex items-center justify-between p-2 rounded-lg hover:bg-surface-variant/50 transition-colors min-h-[44px]">
<div class="flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<span class="font-body-base text-body-base text-on-surface">Cold Shower</span>
</div>
<div class="w-6 h-6 rounded border-2 border-outline-variant flex items-center justify-center cursor-pointer active:scale-95 transition-transform hover:border-primary">
</div>
</div>
</section>
<!-- Quantitative Habit: Water -->
<section class="bg-surface-dark border border-border-dark rounded-xl p-4 flex flex-col gap-element-gap">
<div class="flex items-center justify-between mb-2">
<div class="flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-primary-container"></div>
<h2 class="font-body-base text-body-base font-semibold text-on-surface">Water Intake</h2>
</div>
<span class="font-mono-data text-mono-data text-on-surface-variant">Liters</span>
</div>
<div class="flex items-center justify-between bg-surface py-2 px-4 rounded-lg">
<button class="w-touch-target-min h-touch-target-min flex items-center justify-center rounded-lg bg-surface-variant text-on-surface hover:bg-surface-container-highest active:scale-95 transition-all">
<span class="material-symbols-outlined">remove</span>
</button>
<div class="flex items-baseline gap-1">
<span class="font-stat-lg text-stat-lg text-on-surface">2</span>
<span class="font-mono-data text-mono-data text-outline-variant">/ 3L</span>
</div>
<button class="w-touch-target-min h-touch-target-min flex items-center justify-center rounded-lg bg-surface-variant text-on-surface hover:bg-surface-container-highest active:scale-95 transition-all text-primary">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</section>
<!-- Fasting Window Habit -->
<section class="bg-surface-dark border border-border-dark rounded-xl p-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-nutrition"></div>
<div class="flex flex-col">
<span class="font-body-base text-body-base font-semibold text-on-surface">Intermittent Fasting</span>
<span class="font-body-sm text-body-sm text-outline-variant">16:8 Protocol</span>
</div>
</div>
<div class="bg-surface border border-nutrition/30 rounded-full px-4 py-2 flex items-center gap-2 min-h-[44px]">
<span class="material-symbols-outlined text-[18px] text-nutrition">timer</span>
<span class="font-mono-data text-mono-data text-nutrition">14h 22m</span>
</div>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 pb-telegram-bottom-safe bg-surface-container/90 dark:bg-surface-container-lowest/90 backdrop-blur-lg border-t border-border-dark flex justify-around items-center h-16 px-2 md:hidden">
<!-- Active Nav Item -->
<div class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed-dim hover:opacity-80 active:scale-90 transition-all duration-150 cursor-pointer min-w-[64px] min-h-[44px]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">today</span>
<span class="font-label-caps text-label-caps mt-1">Today</span>
</div>
<div class="flex flex-col items-center justify-center text-outline dark:text-outline-variant hover:text-primary-container dark:hover:text-primary-fixed active:scale-90 transition-all duration-150 cursor-pointer min-w-[64px] min-h-[44px]">
<span class="material-symbols-outlined">calendar_view_month</span>
<span class="font-label-caps text-label-caps mt-1">Stats</span>
</div>
<div class="flex flex-col items-center justify-center text-outline dark:text-outline-variant hover:text-primary-container dark:hover:text-primary-fixed active:scale-90 transition-all duration-150 cursor-pointer min-w-[64px] min-h-[44px]">
<span class="material-symbols-outlined">insights</span>
<span class="font-label-caps text-label-caps mt-1">Charts</span>
</div>
<div class="flex flex-col items-center justify-center text-outline dark:text-outline-variant hover:text-primary-container dark:hover:text-primary-fixed active:scale-90 transition-all duration-150 cursor-pointer min-w-[64px] min-h-[44px]">
<span class="material-symbols-outlined">query_stats</span>
<span class="font-label-caps text-label-caps mt-1">Insights</span>
</div>
<div class="flex flex-col items-center justify-center text-outline dark:text-outline-variant hover:text-primary-container dark:hover:text-primary-fixed active:scale-90 transition-all duration-150 cursor-pointer min-w-[64px] min-h-[44px]">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-caps text-label-caps mt-1">Setup</span>
</div>
</nav>
</body></html>
